<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Mascot Chatbot Host Example</title>
<style>
  body {
    min-height: 100vh;
    margin: 0;
    background: #F8FAFC;
    color: #0F172A;
    font-family: system-ui, sans-serif;
  }

  .app {
    max-width: 760px;
    margin: 0 auto;
    padding: 48px 20px;
  }

  .chat {
    display: grid;
    gap: 14px;
    margin-top: 24px;
  }

  .message {
    max-width: 72%;
    padding: 12px 14px;
    border-radius: 8px;
    background: #E2E8F0;
    line-height: 1.45;
  }

  .message.user {
    justify-self: end;
    background: #2563EB;
    color: #FFFFFF;
  }

  .composer {
    display: flex;
    gap: 10px;
    margin-top: 22px;
  }

  input {
    min-width: 0;
    flex: 1;
    border: 1px solid #CBD5E1;
    border-radius: 8px;
    padding: 12px;
    font: inherit;
  }

  button {
    border: 0;
    border-radius: 8px;
    padding: 0 18px;
    background: #FF6B35;
    color: #FFFFFF;
    cursor: pointer;
    font: inherit;
    font-weight: 800;
  }
</style>
</head>
<body>
  <main class="app">
    <h1>Support Chat</h1>
    <p>This page behaves like a regular chatbot host. The mascot reacts to chat events without the host page touching internal SVG or CSS.</p>

    <section class="chat" id="chat">
      <div class="message">Hi, I can help you test the mascot widget.</div>
    </section>

    <form class="composer" id="composer">
      <input id="message" value="Can you help me?" aria-label="Chat message">
      <button type="submit">Send</button>
    </form>
  </main>

  <div id="assistant-mascot"></div>

  <script src="../mascot-widget.js"></script>
  <script>
    const chat = document.querySelector('#chat');
    const composer = document.querySelector('#composer');
    const input = document.querySelector('#message');

    const mascot = MascotWidget.mount('#assistant-mascot', {
      mode: 'fixed',
      placement: 'bottom-right',
      size: 220,
      welcomeText: 'Need help?',
    });

    function addMessage(text, type) {
      const message = document.createElement('div');
      message.className = `message ${type || ''}`.trim();
      message.textContent = text;
      chat.appendChild(message);
    }

    composer.addEventListener('submit', event => {
      event.preventDefault();
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, 'user');
      mascot.setMood('thinking', { silent: true }).say('Thinking...', { duration: 1200 });

      setTimeout(() => {
        addMessage('This is where your chatbot response would appear.');
        mascot.setMood('success', { silent: true }).say('I found an answer.', { duration: 2600 }).wave();
      }, 900);
    });
  </script>
</body>
</html>
