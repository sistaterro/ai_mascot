<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Mascot Widget Demo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }

  body {
    min-height: 100vh;
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    background: #F0F4FF;
    color: #1E293B;
    font-family: system-ui, sans-serif;
  }

  .demo-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .demo-label {
    color: #64748B;
    font-size: .75rem;
    font-weight: 800;
    letter-spacing: .1em;
    text-transform: uppercase;
  }

  .demo-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
  }

  button {
    border: 0;
    border-radius: 999px;
    padding: 9px 16px;
    background: #FFFFFF;
    color: #1E293B;
    box-shadow: 0 4px 14px rgba(15, 23, 42, .12);
    cursor: pointer;
    font: inherit;
    font-size: .9rem;
    font-weight: 700;
  }

  button:hover { transform: translateY(-1px); }
  button:active { transform: translateY(0) scale(.97); }
</style>
</head>
<body>
  <div id="mascot"></div>

  <div class="demo-panel">
    <div class="demo-label">Moods</div>
    <div class="demo-row">
      <button data-mood="happy">Happy</button>
      <button data-mood="sad">Sad</button>
      <button data-mood="excited">Excited</button>
      <button data-mood="sleepy">Sleepy</button>
      <button data-mood="thinking">Thinking</button>
      <button data-mood="success">Success</button>
      <button data-mood="error">Error</button>
    </div>

    <div class="demo-label">Actions</div>
    <div class="demo-row">
      <button data-action="wave">Wave</button>
      <button data-action="jump">Jump</button>
      <button data-action="say">Say</button>
      <button data-action="hide">Hide</button>
      <button data-action="show">Show</button>
    </div>
  </div>

  <script src="mascot-widget.js"></script>
  <script>
    const mascot = MascotWidget.mount('#mascot');

    document.querySelectorAll('[data-mood]').forEach(button => {
      button.addEventListener('click', () => mascot.setMood(button.dataset.mood));
    });

    document.querySelector('[data-action="wave"]').addEventListener('click', () => mascot.wave());
    document.querySelector('[data-action="jump"]').addEventListener('click', () => mascot.jump());
    document.querySelector('[data-action="say"]').addEventListener('click', () => {
      mascot
        .setMood('listening', { silent: true })
        .say('Ahora sí: esta burbuja viene desde la API pública.', { duration: 4200 });
    });
    document.querySelector('[data-action="hide"]').addEventListener('click', () => mascot.hide());
    document.querySelector('[data-action="show"]').addEventListener('click', () => {
      mascot
        .show()
        .setMood('happy', { silent: true })
        .say('Volví 👋', { duration: 1800 })
        .wave();
    });
  </script>
</body>
</html>
